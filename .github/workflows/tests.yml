name: Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 — PHP 8.1
          - php: "8.1"
            laravel: "10.*"
            testbench: "8.*"
            stability: prefer-stable

          # Laravel 10 — PHP 8.2
          - php: "8.2"
            laravel: "10.*"
            testbench: "8.*"
            stability: prefer-stable

          # Laravel 11 — PHP 8.2
          - php: "8.2"
            laravel: "11.*"
            testbench: "9.*"
            stability: prefer-stable

          # Laravel 11 — PHP 8.3
          - php: "8.3"
            laravel: "11.*"
            testbench: "9.*"
            stability: prefer-stable

          # Laravel 12 — PHP 8.2
          - php: "8.2"
            laravel: "12.*"
            testbench: "10.*"
            stability: prefer-stable

          # Laravel 12 — PHP 8.3
          - php: "8.3"
            laravel: "12.*"
            testbench: "10.*"
            stability: prefer-stable

          # Laravel 12 — PHP 8.4
          - php: "8.4"
            laravel: "12.*"
            testbench: "10.*"
            stability: prefer-stable

          # Laravel 13 — PHP 8.2
          - php: "8.2"
            laravel: "13.*"
            testbench: "11.*"
            stability: prefer-stable

          # Laravel 13 — PHP 8.3
          - php: "8.3"
            laravel: "13.*"
            testbench: "11.*"
            stability: prefer-stable

          # Laravel 13 — PHP 8.4
          - php: "8.4"
            laravel: "13.*"
            testbench: "11.*"
            stability: prefer-stable

    name: "PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction \
            --no-update
          composer update \
            --${{ matrix.stability }} \
            --prefer-dist \
            --no-interaction

      - name: Run tests
        run: ./vendor/bin/pest --no-coverage
